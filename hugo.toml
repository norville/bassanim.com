baseURL = "https://www.bassanim.com/"
languageCode = "en-us"
title = "Marco Bassani"
theme = "terminal"
enableRobotsTXT = true

[markup.goldmark.renderer]
  unsafe = true
[markup.highlight]
  noClasses = false

[params]
  contentTypeName = "posts"
  showMenuItems = 4
  showLanguageSelector = false
  fullWidthTheme = false
  centerTheme = true
  autoCover = false
  showLastUpdated = false

[languages]
  [languages.en]
    languageName = "English"
    title = "Marco Bassani"
    [languages.en.params]
      subtitle = "Facility & Project Manager | Technology Advisor"
      owner = "Marco Bassani"
      keywords = "facility manager, project manager, technology advisor, operations, Netherlands"
      copyright = "© 2026 Marco Bassani"
      menuMore = "More"
      readMore = "Read more"
      readOtherPosts = "Other posts"
      newerPosts = "Newer"
      olderPosts = "Older"
      missingContentMessage = "Page not found..."
      missingBackButtonLabel = "Back to home"
      minuteReadingTime = "min read"
      words = "words"
      [languages.en.params.logo]
        logoText = "bassanim.com"
        logoHomeLink = "/"
      [languages.en.menu]
        [[languages.en.menu.main]]
          identifier = "about"
          name = "About"
          url = "/about"
          weight = 1
        [[languages.en.menu.main]]
          identifier = "experience"
          name = "Experience"
          url = "/experience"
          weight = 2
        [[languages.en.menu.main]]
          identifier = "skills"
          name = "Skills"
          url = "/skills"
          weight = 3
        [[languages.en.menu.main]]
          identifier = "contact"
          name = "Contact"
          url = "/contact"
          weight = 4

#[module]
#[[module.imports]]
#  path = "github.com/panr/hugo-theme-terminal/v4"
